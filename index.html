<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Robin BONNEFOY - FREDON Occitanie">
    <title> Carto'Captages Occitanie </title>


    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <!-- JQuery -->
	<script src="https://code.jquery.com/jquery-3.5.0.js"></script>

    <!-- L.Mask (https://github.com/ptma/Leaflet.Mask) -->
    <script src="assets/js/leaflet.mask.js"></script>

    <!-- Import du style css -->
	<link rel="stylesheet" type="text/css" href="style.css">


    


</head>
<body>
    <div id="loader">
        <img id="logo" src="assets/images/logo_captage.png" alt="Logo Captages d'EAUccitanie">
    </div>
    <div id="map"></div>
    <button id="bt_demarches" class="openbtn"><img src="assets/images/demarche.png" alt="Infos Démarche(s)" class="logo_lateral"></button>
    <button id="bt_captages" class="openbtn"><img src="assets/images/goutte_menu.png" alt="Infos Captage(s)" class="logo_lateral"></button>
    <div id="panel">

        <button id="bt_fermer"> > </button>
        <div id="panel-content">

            <!-- En-tête Onglets -->
            <div id="onglets" class="onglet"> 
                <button type="button" id="bt_onglet_demarches" data-onglet="onglet_demarches" class="bt_onglet">
                    <img src="assets/images/demarche.png" class="image_onglet">
                    <span class="titre_onglet"> Démarche territoriale </span>
                </button>
                <button type="button" id="bt_onglet_captages" data-onglet="onglet_captages" class="bt_onglet">
                    <img src="assets/images/goutte_menu.png" class="image_onglet">
                    <span class="titre_onglet"> Captage(s) associé(s) </span>
                </button>
            </div>

            <!-- Contenu Onglets -->
            <fieldset id="onglet_demarches">
                Si vous avez connaissance d'une démarche en cours dans ce secteur, <a href="https://www.fredonoccitanie.com/captages/nous-contacter/" > contactez-nous</a>.
            </fieldset>

            <fieldset id="onglet_captages">
                Infos sur le(les) captages.
            </fieldset>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
