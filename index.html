<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Robin BONNEFOY - FREDON Occitanie">
    <title> Carto'Captages Occitanie </title>


    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <!-- JQuery -->
	<script src="https://code.jquery.com/jquery-3.5.0.js"></script>

    <!-- L.Mask (https://github.com/ptma/Leaflet.Mask) -->
    <!-- <script src="assets/js/leaflet.mask.js"></script> -->

    <!-- Inverser les polygones - Leaflet.snogylop (https://github.com/ebrelsford/Leaflet.snogylop) -->
    <script src="assets/js/leaflet.snogylop.js"></script>

    <!-- Import du style css -->
	<link rel="stylesheet" type="text/css" href="style.css">


    


</head>
<body>
    <div id="loader">
        <img id="logo" src="assets/images/logo_captage.png" alt="Logo Captages d'EAUccitanie">
    </div>
    <div id="map"></div>
    <!-- Panneau latéral droit (Démarches / captages)-->
    <button id="bt_demarches" class="openbtn openbtn-right"><img src="assets/images/demarche.png" alt="Infos Démarche(s)" class="logo_lateral"></button>
    <button id="bt_captages" class="openbtn openbtn-right"><img src="assets/images/goutte_menu.png" alt="Infos Captage(s)" class="logo_lateral"></button>
    <div id="panel-right">
        <button class="bt_fermer" id="bt_fermer-right"> > </button>
        <div id="panel-content">
            <!-- En-tête -->
            <div id="onglets" class="onglet"> 
                <button type="button" id="bt_onglet_demarches" data-onglet="onglet_demarches" class="bt_onglet">
                    <img src="assets/images/demarche.png" class="image_onglet" alt="Logo démarche">
                    <span class="titre_onglet"> Démarche territoriale </span>
                </button>
                <button type="button" id="bt_onglet_captages" data-onglet="onglet_captages" class="bt_onglet">
                    <img src="assets/images/goutte_menu.png" class="image_onglet" alt="Logo captage">
                    <span class="titre_onglet"> Captage(s) associé(s) </span>
                </button>
            </div>
            <!-- Contenu -->
            <fieldset id="onglet_demarches">
                <div class="no_demarche"> 
                    Aucune demarche / AAC sélectionnée
                </div>
            </fieldset>

            <fieldset id="onglet_captages">
                <div class="no_demarche"> 
                    Aucun captage sélectionné
                </div>
            </fieldset>
        </div>
    </div>
    <!-- Panneau latéral Gauche (Recherche / Légende)-->
    <button id="bt_recherche" class="openbtn openbtn-left"><img src="assets/images/loupe.png" alt="Rechercher" class="logo_lateral"></button>
    <button id="bt_legende" class="openbtn openbtn-left"><img src="assets/images/oeil_grand.png" alt="Légende" class="logo_lateral"></button>
    <div id="panel-left">
        <!-- Bouton Fermer le panneau  -->
        <span class="btContainer-left"><button class="bt_fermer" id="bt_fermer-left"> < </button></span>
        <!-- Barre de recherche -->
        <div class="search-container">
            <img src="assets/images/loupe.png" alt="Rechercher" class="search-loupe">
            <input type="text" id="searchInput" placeholder="Rechercher..." autocomplete="off">
            <span id="clearSearch" class="clear-button">&times;</span>        
            <div id="results"></div>
        </div>
        <div id="legend" class="container-left">
            <div class="legend-element">
                <img src="assets/images/goutte_j.png" alt="captage sensible" class="legend-goutte">
                Captage sensible
            </div>
            <div class="legend-element">
                <img src="assets/images/goutte_b.png" alt="captage prioritaire" class="legend-goutte">
                Captage prioritaire
            </div>
            <div class="legend-element">
                <span style="background-color: white; border: 2px solid rgb(144,187,70) ;"></span>
                ZPAAC
            </div>
            <div class="legend-element">
                <span style="background-color: rgb(87,107,53,0.5); border: 3px solid rgb(87,107,53);"></span>
                AAC
            </div>
            <div class="legend-element legend-arbitraire">
                <span style="background-color: rgb(87,107,53,0.5); border: 3px dashed rgb(87,107,53);"></span>
                <i> Périmètre arbitraire </i>
            </div>
            <div class="legend-element">
                <span style="background-color: rgb(000,124,142,0.5); border: 3px solid rgb(000,124,142)"></span>
                Démarches
            </div>
            <div class="legend-element legend-arbitraire">
                <span style="background-color: rgb(000,124,142,0.5); border: 3px dashed rgb(000,124,142)"></span>
                <i> Périmètre arbitraire </i>
            </div>
            <div class="legend-element">
                <span style="background-color: white; border: 2px solid rgb(113,151,141);"></span>
                Département
            </div>
            <div class="legend-element">
                <span style="background-color: white; border: 2px solid rgb(108,188,165);"></span>
                Bassin versant
            </div>
        </div>

        <div id="filtre" class="container-left">
            <span id="filtre-titre"> Animations </span>
            <ul>
                <li class="layer-element">
                    <label title="Afficher / Masquer les animations en cours ou en émergence" for="filtre_en_cours">
                      <input type="checkbox" id="filtre_en_cours" name="item" class="item" value="En émergence / en cours" checked>
                      <span class="custom-checkbox"></span>
                      <span> En émergence / en cours </span>
                    </label>
                </li>
                <li class="layer-element">
                    <label title="Afficher / Masquer les animations terminées" for="filtre_terminee">
                      <input type="checkbox" id="filtre_terminee" name="item" class="item" value="Terminées" checked>
                      <span class="custom-checkbox"></span>
                      <span>Terminées</span>
                    </label>
                </li>
                <li class="layer-element">
                    <label title="Afficher / Masquer les animations non initiées" for="filtre_non_initie">
                      <input type="checkbox" id="filtre_non_initie" name="item" class="item" value="Non initiées" checked>
                      <span class="custom-checkbox"></span>
                      <span>Non initiées</span>
                    </label>
                </li>
                <li class="layer-element-reseau">
                    <label title="Afficher que les membres du réseau" for="filtre_reseau">
                      <input type="checkbox" id="filtre_reseau" name="item" value="Membre du réseau">
                      <span class="custom-text">Afficher que les membres du réseau</span>
                    </label>
                </li>
            </ul>
        </div>
    </div>


    <script src="app.js"></script>

</body>
</html>
